<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LAB - Study Shell</title>
    <script src="https://lucide.dev/icons/pencil.js"></script>
    <script src="https://lucide.dev/icons/trash-2.js"></script>
    <script src="https://lucide.dev/icons/plus.js"></script>
    <script src="https://lucide.dev/icons/external-link.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --aqua-teal: #14b8a6;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(20, 184, 166, 0.3);
            --text: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: transparent;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 1. BLUE LIGHT BAR (POMODORO) */
        #pomo-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        #pomo-bar {
            height: 100%;
            width: 0%;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 1s linear;
        }

        .timer-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: var(--neon-blue);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--glass-bg);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--glass-border);
        }

        /* Layout */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px 20px 20px;
            height: 100%;
        }

        section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            padding-right: 5px;
        }

        h2 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--aqua-teal);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Glassmorphic Components */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .glass-card:hover {
            border-color: var(--aqua-teal);
            background: rgba(20, 184, 166, 0.1);
        }

        /* Column A: Portals */
        .portal-link {
            text-decoration: none;
            color: white;
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .icon-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .icon-btn:hover { color: var(--neon-blue); }

        /* Column B: Checklist */
        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            accent-color: var(--aqua-teal);
            width: 16px;
            height: 16px;
        }

        .task-text { font-size: 0.9rem; flex-grow: 1; }
        .completed { text-decoration: line-through; opacity: 0.5; }

        .add-btn {
            margin-top: auto;
            background: transparent;
            border: 1px dashed var(--glass-border);
            color: var(--aqua-teal);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="pomo-container"><div id="pomo-bar"></div></div>
    <div class="timer-controls" onclick="toggleTimer()" id="timer-display">25:00 - START</div>

    <main>
        <section id="portals-section">
            <h2>Portals</h2>
            <div id="portals-list"></div>
        </section>

        <section id="practice-section">
            <h2>Practice <span id="progress-percent" style="font-size: 0.7rem;">0%</span></h2>
            <div id="tasks-list"></div>
            <button class="add-btn" onclick="addTask()">+ ADD PRACTICE TASK</button>
        </section>
    </main>

    <script>
        // --- DATA PERSISTENCE ---
        const DEFAULT_PORTALS = [
            { name: "Mathematics", url: "https://www.khanacademy.org/math/" },
            { name: "AI Specialization", url: "https://platform.outskill.com/" },
            { name: "Language Protocol", url: "https://learn.mangolanguages.com/login" },
            { name: "Grammar", url: "https://www.khanacademy.org/humanities/grammar" },
            { name: "Classic Studies", url: "https://oldfashionededucation.com" },
            { name: "Research", url: "https://notebooklm.google" }
        ];

        const DEFAULT_TASKS = [
            { id: 1, text: "Duolingo", done: false },
            { id: 2, text: "Coursera", done: false },
            { id: 3, text: "EdX", done: false },
            { id: 4, text: "TRE", done: false },
            { id: 5, text: "Special Practice", done: false }
        ];

        let portals = JSON.parse(localStorage.getItem('lab_portals')) || DEFAULT_PORTALS;
        let tasks = JSON.parse(localStorage.getItem('lab_tasks')) || DEFAULT_TASKS;

        // --- POMODORO LOGIC ---
        let timerSeconds = localStorage.getItem('lab_timer_secs') || 1500;
        let isRunning = localStorage.getItem('lab_timer_running') === 'true';
        let timerInterval;

        function updateTimerUI() {
            const bar = document.getElementById('pomo-bar');
            const display = document.getElementById('timer-display');
            const progress = ((1500 - timerSeconds) / 1500) * 100;
            bar.style.width = `${progress}%`;
            
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            display.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs} - ${isRunning ? 'PAUSE' : 'START'}`;
        }

        function toggleTimer() {
            isRunning = !isRunning;
            localStorage.setItem('lab_timer_running', isRunning);
            if (isRunning) {
                startInterval();
            } else {
                clearInterval(timerInterval);
            }
            updateTimerUI();
        }

        function startInterval() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timerSeconds > 0) {
                    timerSeconds--;
                    localStorage.setItem('lab_timer_secs', timerSeconds);
                    updateTimerUI();
                } else {
                    clearInterval(timerInterval);
                    isRunning = false;
                    alert("Focus Session Complete!");
                    timerSeconds = 1500;
                }
            }, 1000);
        }

        // --- PORTAL LOGIC ---
        function renderPortals() {
            const list = document.getElementById('portals-list');
            list.innerHTML = portals.map((p, i) => `
                <div class="glass-card">
                    <a href="${p.url}" target="_blank" class="portal-link">
                        <span>${p.name}</span>
                    </a>
                    <button class="icon-btn" onclick="editPortal(${i})">✏️</button>
                </div>
            `).join('');
            localStorage.setItem('lab_portals', JSON.stringify(portals));
        }

        function editPortal(i) {
            const name = prompt("Portal Name:", portals[i].name);
            const url = prompt("Portal URL:", portals[i].url);
            if (name && url) {
                portals[i] = { name, url };
                renderPortals();
            }
        }

        // --- TASK LOGIC ---
        function renderTasks() {
            const list = document.getElementById('tasks-list');
            list.innerHTML = tasks.map((t, i) => `
                <div class="glass-card task-item">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})">
                    <span class="task-text ${t.done ? 'completed' : ''}">${t.text}</span>
                    <button class="icon-btn" onclick="deleteTask(${i})">🗑️</button>
                </div>
            `).join('');
            localStorage.setItem('lab_tasks', JSON.stringify(tasks));
            calculateProgress();
        }

        function toggleTask(i) {
            tasks[i].done = !tasks[i].done;
            renderTasks();
        }

        function addTask() {
            const text = prompt("New Practice Task:");
            if (text) {
                tasks.push({ id: Date.now(), text, done: false });
                renderTasks();
            }
        }

        function deleteTask(i) {
            tasks.splice(i, 1);
            renderTasks();
        }

        function calculateProgress() {
            const total = tasks.length;
            const checked = tasks.filter(t => t.done).length;
            const progress = total === 0 ? 0 : Math.round((checked / total) * 100);
            
            document.getElementById('progress-percent').textContent = `${progress}%`;

            // HANDSHAKE TO PARENT
            window.parent.postMessage({ 
                type: 'UPDATE_PROGRESS', 
                appId: 'the-lab-02', 
                value: progress / 100 
            }, '*');
        }

        // --- INIT ---
        if (isRunning) startInterval();
        updateTimerUI();
        renderPortals();
        renderTasks();
    </script>
</body>
</html>
