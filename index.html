<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LAB - Chronos Integrated</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --aqua-teal: #14b8a6;
            --gold: #ffcc00;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(20, 184, 166, 0.3);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Space Grotesk", -apple-system, sans-serif; }
        body { background: transparent; color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* POMODORO HEADER */
        #pomo-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(0, 0, 0, 0.3); z-index: 100; }
        #pomo-bar { height: 100%; width: 0%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); transition: width 1s linear; }
        .timer-controls { position: fixed; top: 10px; right: 10px; font-size: 0.7rem; color: var(--neon-blue); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; background: var(--glass-bg); padding: 4px 12px; border-radius: 4px; border: 1px solid var(--glass-border); z-index: 101; }

        /* LAYOUT */
        main { display: grid; grid-template-columns: 320px 1fr 300px; gap: 20px; padding: 40px 20px 20px; height: 100%; }
        section { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 5px; }
        h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--aqua-teal); margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }

        /* PORTALS & TASKS */
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 10px; padding: 12px; transition: all 0.2s ease; position: relative; }
        .glass-card:hover { border-color: var(--neon-blue); background: rgba(20, 184, 166, 0.1); }
        .portal-link { text-decoration: none; color: white; flex-grow: 1; font-size: 0.85rem; display: flex; flex-direction: column; }
        .portal-sub { font-size: 0.65rem; opacity: 0.5; text-transform: uppercase; }
        
        /* CALENDAR */
        .cal-container { background: var(--glass-bg); border-radius: 15px; border: 1px solid var(--glass-border); padding: 15px; display: flex; flex-direction: column; height: 100%; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; font-size: 0.7rem; margin-top: 10px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; background: rgba(255,255,255,0.03); cursor: pointer; position: relative; }
        .cal-day:hover { background: var(--aqua-teal); color: black; }
        .dot { width: 3px; height: 3px; border-radius: 50%; position: absolute; bottom: 2px; }
        .dot-cyan { background: var(--neon-blue); }
        .dot-gold { background: var(--gold); }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; z-index: 200; align-items: center; justify-content: center; }
        .modal-card { background: #0f172a; border: 1px solid var(--glass-border); padding: 30px; border-radius: 20px; width: 400px; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; padding: 10px; width: 100%; border-radius: 8px; margin-top: 10px; outline: none; }
        .btn-add { background: var(--aqua-teal); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 15px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        .btn-small { background: none; border: 1px solid var(--glass-border); color: var(--aqua-teal); padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="pomo-container"><div id="pomo-bar"></div></div>
    <div class="timer-controls" onclick="toggleTimer()" id="timer-display">25:00 - START</div>

    <main>
        <section>
            <h2>Study Portals <button class="btn-small" onclick="openPortalModal()">+ ADD</button></h2>
            <div id="portals-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </section>

        <section>
            <h2>Chronos Master Schedule</h2>
            <div class="cal-container">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span id="cal-month" style="font-size: 0.9rem; font-weight: bold;">Month</span>
                    <div>
                        <button onclick="changeMonth(-1)" style="background:none; border:none; color:white; cursor:pointer;">←</button>
                        <button onclick="changeMonth(1)" style="background:none; border:none; color:white; cursor:pointer;">→</button>
                    </div>
                </div>
                <div class="cal-grid" id="calendar-body"></div>
                <button class="btn-add" onclick="openMissionModal()">+ INJECT NEW MISSION</button>
            </div>
        </section>

        <section>
            <h2>Daily Practice <span id="progress-percent" style="color: var(--neon-blue);">0%</span></h2>
            <div id="tasks-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </section>
    </main>

    <div id="portal-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="color: var(--aqua-teal); font-size: 0.8rem; letter-spacing: 2px;">NEW STUDY PORTAL</h3>
            <input type="text" id="portal-name" placeholder="Portal Name">
            <input type="text" id="portal-sub" placeholder="Subject">
            <input type="text" id="portal-url" placeholder="https://...">
            <button class="btn-add" onclick="savePortal()">SYNC PORTAL</button>
            <button onclick="closeModals()" style="background:none; color:gray; width:100%; margin-top:10px; border:none; cursor:pointer;">CANCEL</button>
        </div>
    </div>

    <div id="mission-modal" class="modal-overlay"><div class="modal-card">
        <h3 style="color: var(--neon-blue); font-size: 0.8rem; letter-spacing: 2px;">DEPLOY MISSION</h3>
        <input type="text" id="task-name" placeholder="Mission Name"><input type="date" id="task-date">
        <select id="task-type"><option value="study">Study Session</option><option value="ritual">Ritual</option></select>
        <button class="btn-add" onclick="saveMission()">CONFIRM</button>
        <button onclick="closeModals()" style="background:none; color:gray; width:100%; margin-top:10px; border:none; cursor:pointer;">CANCEL</button>
    </div></div>

    <script>
        // --- PORTAL DATA ---
        const HARDCODED_PORTALS = [
            { name: "Harvard CS50 AI", sub: "Python & AI", url: "https://cs50.harvard.edu/ai" },
            { name: "Stanford CS229", sub: "Machine Learning", url: "https://cs229.stanford.edu" },
            { name: "Stanford CS224N", sub: "NLP Theory", url: "https://web.stanford.edu/class/cs224n/" },
            { name: "NotebookLM", sub: "AI Synthesis", url: "https://notebooklm.google.com" },
            { name: "Duolingo", sub: "Daily Language", url: "https://duolingo.com" },
            { name: "Mango Languages", sub: "Language Protocol", url: "https://mangolanguages.com" },
            { name: "Coursera", sub: "Certifications", url: "https://coursera.org" },
            { name: "Khan Academy", sub: "Math & Science", url: "https://khanacademy.org" },
            { name: "Oldfashioned Ed", sub: "Classical", url: "https://oldfashionededucation.com" },
            { name: "Hillsdale", sub: "Constitutional", url: "https://hillsdale.edu" },
            { name: "Natalia Beauty", sub: "Specialist", url: "https://beautysales.curseduca.pro" },
            { name: "Modern States", sub: "Freshman Prep", url: "https://modernstates.org" },
            { name: "edX", sub: "Professional", url: "https://edx.org" },
            { name: "Hippocampus", sub: "Multimedia", url: "https://hippocampus.org" },
            { name: "Outskill", sub: "RAG & Voice", url: "https://outskill.com" }
        ];

        let customPortals = JSON.parse(localStorage.getItem('lab_portals_custom')) || [];

        function renderPortals() {
            const allPortals = [...HARDCODED_PORTALS, ...customPortals];
            document.getElementById('portals-list').innerHTML = allPortals.map((p, i) => `
                <div class="glass-card" ${i >= HARDCODED_PORTALS.length ? `oncontextmenu="deletePortal(event, ${i - HARDCODED_PORTALS.length})"` : ''}>
                    <a href="${p.url}" target="_blank" class="portal-link">
                        <span class="portal-sub">${p.sub}</span>
                        <span>${p.name}</span>
                    </a>
                </div>
            `).join('');
        }

        function openPortalModal() { document.getElementById('portal-modal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        function savePortal() {
            const name = document.getElementById('portal-name').value;
            const sub = document.getElementById('portal-sub').value;
            const url = document.getElementById('portal-url').value;
            if(name && url) {
                customPortals.push({ name, sub, url });
                localStorage.setItem('lab_portals_custom', JSON.stringify(customPortals));
                renderPortals();
                closeModals();
            }
        }

        function deletePortal(e, index) {
            e.preventDefault();
            if(confirm("Delete this custom portal?")) {
                customPortals.splice(index, 1);
                localStorage.setItem('lab_portals_custom', JSON.stringify(customPortals));
                renderPortals();
            }
        }

        // --- CALENDAR & TASKS LOGIC (Retained from previous version) ---
        let missions = JSON.parse(localStorage.getItem('lab_missions')) || [{ name: "Capoeira", type: "ritual", dayOfWeek: [1,3,4,5] }];
        let viewDate = new Date();
        let tasks = JSON.parse(localStorage.getItem('lab_tasks')) || [{ text: "House Upkeep", done: false }];

        function renderCalendar() {
            const body = document.getElementById('calendar-body');
            body.innerHTML = '';
            const year = viewDate.getFullYear(), month = viewDate.getMonth();
            document.getElementById('cal-month').innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let i=0; i<firstDay; i++) body.innerHTML += `<div></div>`;
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${month+1}-${d}`;
                const dayObj = new Date(year, month, d);
                const cell = document.createElement('div');
                cell.className = 'cal-day';
                cell.innerText = d;
                missions.forEach(m => {
                    if((m.dayOfWeek && m.dayOfWeek.includes(dayObj.getDay())) || m.date === dateStr) {
                        cell.innerHTML += `<div class="dot ${m.type === 'study' ? 'dot-cyan' : 'dot-gold'}"></div>`;
                    }
                });
                body.appendChild(cell);
            }
        }

        function saveMission() {
            const name = document.getElementById('task-name').value;
            const date = document.getElementById('task-date').value;
            const type = document.getElementById('task-type').value;
            if(name && date) { missions.push({ name, date, type }); localStorage.setItem('lab_missions', JSON.stringify(missions)); renderCalendar(); closeModals(); }
        }

        function renderTasks() {
            document.getElementById('tasks-list').innerHTML = tasks.map((t, i) => `
                <div class="glass-card" style="display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${i})">
                    <span style="font-size:0.8rem; ${t.done ? 'text-decoration:line-through; opacity:0.5' : ''}">${t.text}</span>
                </div>`).join('');
            const progress = Math.round((tasks.filter(t => t.done).length / tasks.length) * 100) || 0;
            document.getElementById('progress-percent').innerText = `${progress}%`;
        }
        function toggleTask(i) { tasks[i].done = !tasks[i].done; localStorage.setItem('lab_tasks', JSON.stringify(tasks)); renderTasks(); }
        function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderCalendar(); }

        // --- TIMER ---
        let timerSeconds = 1500;
        let isRunning = false;
        function toggleTimer() {
            isRunning = !isRunning;
            if(isRunning) {
                window.timerInterval = setInterval(() => {
                    if(timerSeconds > 0) {
                        timerSeconds--;
                        document.getElementById('pomo-bar').style.width = `${((1500 - timerSeconds) / 1500) * 100}%`;
                        document.getElementById('timer-display').innerText = `${Math.floor(timerSeconds/60)}:${(timerSeconds%60).toString().padStart(2,'0')} - PAUSE`;
                    }
                }, 1000);
            } else { clearInterval(window.timerInterval); document.getElementById('timer-display').innerText = `RESUME`; }
        }

        // INIT
        renderPortals();
        renderTasks();
        renderCalendar();
    </script>
</body>
</html>
